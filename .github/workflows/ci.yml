name: Spring Boot CI Pipeline

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give Execute Permission
        run: chmod +x mvnw

      - name: Build Project
        run: ./mvnw clean install -DskipTests

      - name: Run Tests
        run: ./mvnw test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar